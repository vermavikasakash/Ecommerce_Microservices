services:
  # Nginx reverse proxy
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - ecommerce

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DEV_MODE=development
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - CART_SERVICE_URL=http://cart-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - CLIENT_ORIGIN=http://localhost:3000
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - product-service
      - cart-service
      - order-service
      - payment-service
      - rabbitmq
    networks:
      - ecommerce

  # Product Service
  product-service:
    build:
      context: .
      dockerfile: Dockerfile.product
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DEV_MODE=development
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce
    depends_on:
      - mongodb
    networks:
      - ecommerce

  # Cart Service
  cart-service:
    build:
      context: .
      dockerfile: Dockerfile.cart
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DEV_MODE=development
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - product-service
      - mongodb
      - rabbitmq
    networks:
      - ecommerce

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: Dockerfile.order
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DEV_MODE=development
      - CART_SERVICE_URL=http://cart-service:8082
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - cart-service
      - payment-service
      - mongodb
      - rabbitmq
    networks:
      - ecommerce

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.payment
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DEV_MODE=development
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ecommerce

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce

volumes:
  mongo-data:
  rabbitmq-data:

networks:
  ecommerce:
    driver: bridge
